hypotheses:
  - hypothesis_id: H1
    statement: <what may be causing the incident>
    causal_path:
      - <cause>
      - <mechanism>
      - <observed symptom>
    supporting_evidence:
      - source: <structured_record|signal_bundle|collection_report|log>
        detail: <evidence>
    counter_evidence:
      - source: <source>
        detail: <counter evidence>
    disconfirming_conditions:
      - <condition that would refute this hypothesis>
    evidence_gaps:
      - <missing evidence>
    validation_actions:
      - action: <validation action>
        status: <planned|executed|blocked>
        result: <result>
    validation_result: <supported|refuted|insufficient>

conclusion_summary:
  statement: <initial conclusion>
  confidence: <high|medium|low>
  impact_scope: <impact scope>
  primary_cause_category: <category>
  evidence:
    - <key evidence>
  limitations:
    - <limitation or missing evidence>

next_actions:
  - action: <next action>
    risk_level: <read-only|low-risk|high-risk>
    requires_confirmation: true

verification_requests:
  - request_id: <stable request id>
    hypothesis_id: <related hypothesis id>
    purpose: <what evidence this request should verify>
    asset_tier: <first_class|ad_hoc_readonly|blocked>
    asset:
      type: <script|command|ad_hoc_command>
      id: <asset id or generated command id>
    risk_level: <read-only|low-risk|high-risk|destructive>
    execution_policy: <auto_allowed|approval_required|blocked>
    expected_evidence:
      - <field or artifact expected after execution>
    reason: <why this verification is needed>
    status: <planned|executed|blocked>

reasoning_timeline:
  events:
    - time: <timestamp or empty>
      time_precision: <exact|approximate|unknown>
      layer: <user|system|kubernetes|pod|middleware|network|collection|signal|analysis>
      object_ref: <object ref>
      event_type: <event or signal type>
      summary: <what happened>
      source: <source artifact path or field>
      evidence_ref: <optional evidence id>
      confidence: <high|medium|low>
  findings:
    - statement: <timeline-based observation>
      supports:
        - <hypothesis id>
      refutes:
        - <hypothesis id>
      related_hypotheses:
        - <hypothesis id>

deepening_findings:
  - finding_id: <domain invariant or counter-evidence id>
    statement: <what the existing evidence deepens or challenges>
    evidence_refs:
      - <source field or artifact>
    supports:
      - <hypothesis or mechanism id>
    refutes:
      - <hypothesis or mechanism id>
    severity: <high|medium|low>

# summary subset of core/templates/knowledge-candidate.template.yaml;
# candidate_type enum: core/taxonomies/candidate-types.yaml
knowledge_candidates:
  - candidate_id: <candidate_id>
    candidate_type: <runbook|command|script|skill|taxonomy|template|asset-update>
    title: <candidate title>
    reason: <why this should be captured>
    suggested_path: <path>

retrieval_context:
  query_text: <scenario and signal summary for future experience retrieval>
  time_mode: <current_active|historical_resolved|current_or_unknown>
  scenario_candidates:
    - <scenario>
  signal_ids:
    - <signal id>
  object_refs:
    - <object ref>
  evidence_gap_categories:
    - <gap category>

experience_matches: []

source_boundaries:
  current_incident_evidence:
    - structured_record
    - signal_bundle
    - collection_report
  hypothesis_sources_only:
    - customer_clue
    - historical_experience
    - runbook
    - knowledge_asset
  rule: hypothesis_sources_only must not be used as direct supporting evidence for conclusion_summary

generated_at: <timestamp>
updated_at: <timestamp>
