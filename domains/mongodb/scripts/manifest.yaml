    runtime: shell
    readonly: true
    default_packaged: true
    mvp: true

  - script_id: mongodb.collect.logs.previous
    source: collect/collect-logs-previous.sh
    phase: collect
    target: logs
    action: previous
    runtime: shell
    readonly: true
    default_packaged: true
    mvp: true

  - script_id: mongodb.normalize.logs.highlights
