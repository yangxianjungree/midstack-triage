id: mongodb-triage-replica-member-not-healthy
title: Triage MongoDB Replica Member Not Healthy
middleware: mongodb
component: replica-set
primary_scenario: replica-inconsistency
inputs:
  - cluster name
  - namespace or host address
  - suspected member name
outputs:
  - unhealthy member summary
  - likely cause category
  - next recommended runbook step
required_assets:
  - type: scenario
    id: replica-inconsistency
  - type: runbook
    id: mongodb-replica-member-not-healthy
  - type: command
    id: mongodb-check-rs-status
  - type: script
    id: mongodb.collect.pods.state
  - type: script
    id: mongodb.collect.replicaset.rs_status
safety_constraints:
  - default to read-only commands
  - do not trigger stepdown, reconfig, or restart without explicit confirmation
