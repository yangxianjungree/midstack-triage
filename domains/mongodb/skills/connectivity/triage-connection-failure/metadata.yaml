id: mongodb-triage-connection-failure
title: Triage MongoDB Connection Failure
middleware: mongodb
component: connectivity
primary_scenario: connection-failure
inputs:
  - customer clue or business error message
  - namespace or cluster identifier
  - target Service, NodePort, Pod, or connection string if available
outputs:
  - failing connection path
  - likely cause category
  - evidence and evidence gaps
  - next recommended runbook step
required_assets:
  - domains/mongodb/commands/connectivity/check-mongos-connectivity
  - domains/mongodb/runbooks/connectivity/connection-failure
safety_constraints:
  - default to read-only commands
  - do not restart Pods, change Services, edit Secrets, or modify network policy without explicit confirmation
