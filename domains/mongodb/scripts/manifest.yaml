middleware: mongodb
scripts:
  - script_id: mongodb.collect.pods.state
    source: collect/collect-pods-state.sh
    phase: collect
    target: pods
    action: state
    runtime: shell
    readonly: true
    default_packaged: true
    mvp: true
    collection_tier: baseline
    signal_layer: pod
    cost_class: low
    noise_class: low

  - script_id: mongodb.collect.statefulsets.yaml
    source: collect/collect-statefulsets-yaml.sh
    phase: collect
    target: statefulsets
    action: yaml
    runtime: shell
    readonly: true
    default_packaged: true
    mvp: true
    collection_tier: baseline
    signal_layer: orchestration
    cost_class: low
    noise_class: low

  - script_id: mongodb.collect.services.yaml
    source: collect/collect-services-yaml.sh
    phase: collect
    target: services
    action: yaml
    runtime: shell
    readonly: true
    default_packaged: true
    mvp: true
    collection_tier: baseline
    signal_layer: service
    cost_class: low
    noise_class: low

  - script_id: mongodb.collect.nodes.state
    source: collect/collect-nodes-state.sh
    phase: collect
    target: nodes
    action: state
    runtime: shell
    readonly: true
    default_packaged: true
    mvp: true
    collection_tier: baseline
    signal_layer: system
    cost_class: low
    noise_class: low

  - script_id: mongodb.collect.events.yaml
    source: collect/collect-events-yaml.sh
    phase: collect
    target: events
    action: yaml
    runtime: shell
    readonly: true
    default_packaged: true
    mvp: true
    collection_tier: baseline
    signal_layer: orchestration
    cost_class: medium
    noise_class: medium
    sample_policy:
      scope: namespace
      max_events: 200

  - script_id: mongodb.collect.resources.metrics
    source: collect/collect-resource-metrics.sh
    phase: collect
    target: resources
    action: metrics
    runtime: shell
    readonly: true
    default_packaged: true
    mvp: true
    collection_tier: baseline
    signal_layer: system
    cost_class: medium
    noise_class: low
    sample_policy:
      source: metrics-server
      max_targets: namespace

  - script_id: mongodb.collect.mongos.get_shard_map
    source: collect/collect-mongos-get-shard-map.sh
    phase: collect
    target: mongos
    action: get_shard_map
    runtime: shell
    readonly: true
    default_packaged: true
    mvp: true
    collection_tier: baseline
    signal_layer: service
    cost_class: medium
    noise_class: low

  - script_id: mongodb.collect.replicaset.rs_status
    source: collect/collect-replicaset-rs-status.sh
    phase: collect
    target: replicaset
    action: rs_status
    runtime: shell
    readonly: true
    default_packaged: true
    mvp: true
    collection_tier: baseline
    signal_layer: service
    cost_class: medium
    noise_class: low

  - script_id: mongodb.collect.replicaset.rs_conf
    source: collect/collect-replicaset-rs-status.sh
    phase: collect
    target: replicaset
    action: rs_conf
    runtime: shell
    readonly: true
    default_packaged: true
    mvp: false
    collection_tier: directed
    signal_layer: service
    cost_class: medium
    noise_class: low

  - script_id: mongodb.collect.logs.current
    source: collect/collect-logs-current.sh
    phase: collect
    target: logs
    action: current
    runtime: shell
    readonly: true
    default_packaged: true
    mvp: true
    collection_tier: baseline
    signal_layer: logs
    cost_class: medium
    noise_class: high
    sample_policy:
      tail_lines: 1000
      max_targets: 8

  - script_id: mongodb.collect.logs.previous
    source: collect/collect-logs-previous.sh
    phase: collect
    target: logs
    action: previous
    runtime: shell
    readonly: true
    default_packaged: true
    mvp: true
    collection_tier: baseline
    signal_layer: logs
    cost_class: medium
    noise_class: high
    sample_policy:
      tail_lines: 1000
      max_targets: 8

  - script_id: mongodb.collect.logs.discover_sink
    source: collect/collect-log-sink.sh
    phase: collect
    target: logs
    action: discover_sink
    runtime: shell
    readonly: true
    default_packaged: true
    mvp: false
    collection_tier: directed
    signal_layer: logs
    cost_class: medium
    noise_class: medium
    trigger_policy: "run when kubectl logs are too short or log sink is unknown"

  - script_id: mongodb.collect.logs.file_tail
    source: collect/collect-log-file-tail.sh
    phase: collect
    target: logs
    action: file_tail
    runtime: shell
    readonly: true
    default_packaged: true
    mvp: false
    collection_tier: directed
    signal_layer: logs
    cost_class: high
    noise_class: high
    sample_policy:
      tail_lines: 400
      max_targets: 8
    trigger_policy: "run after log sink discovery finds a file-backed MongoDB log"

  - script_id: mongodb.collect.logs.node_file_tail
    source: collect/collect-log-node-file-tail.sh
    phase: collect
    target: logs
    action: node_file_tail
    runtime: shell
    readonly: true
    default_packaged: true
    mvp: false
    collection_tier: directed
    signal_layer: logs
    cost_class: high
    noise_class: high
    sample_policy:
      tail_lines: 500
      max_targets: 8
    trigger_policy: "run only when node SSH access is explicitly enabled and pod file logs remain missing"

  - script_id: mongodb.collect.dns.coredns
    source: collect/collect-dns-coredns.sh
    phase: collect
    target: dns
    action: coredns
    runtime: shell
    readonly: true
    default_packaged: true
    mvp: false
    collection_tier: directed
    signal_layer: network
    cost_class: medium
    noise_class: medium
    trigger_policy: "run when DNS or service resolution symptoms are present"

  - script_id: mongodb.collect.network.overlay
    source: collect/collect-network-overlay.sh
    phase: collect
    target: network
    action: overlay
    runtime: shell
    readonly: true
    default_packaged: true
    mvp: false
    collection_tier: directed
    signal_layer: network
    cost_class: medium
    noise_class: medium
    trigger_policy: "run when DNS timeout or overlay partition symptoms are present"

  - script_id: mongodb.collect.pods.describe
    source: collect/collect-pods-describe.sh
    phase: collect
    target: pods
    action: describe
    runtime: shell
    readonly: true
    default_packaged: true
    mvp: false
    collection_tier: directed
    signal_layer: orchestration
    cost_class: medium
    noise_class: medium
    trigger_policy: "run when pod scheduling, readiness, or crashloop signals need event-level detail"

  - script_id: mongodb.normalize.logs.highlights
    source: normalize/normalize-logs-highlights.py
    phase: normalize
    target: logs
    action: highlights
    runtime: python
    readonly: true
    default_packaged: true
    mvp: true
    collection_tier: baseline
    signal_layer: logs
    cost_class: low
    noise_class: low

  - script_id: mongodb.normalize.signals.bundle
    source: normalize/normalize-signals-bundle.py
    phase: normalize
    target: signals
    action: bundle
    runtime: python
    readonly: true
    default_packaged: true
    mvp: true
    collection_tier: baseline
    signal_layer: service
    cost_class: low
    noise_class: low
