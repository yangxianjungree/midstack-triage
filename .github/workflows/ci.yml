name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip PyYAML pytest

      - name: Repository validators
        run: python tools/validators/validate-repo.py --skip-cursor

      - name: Unit tests
        run: python -m pytest tests -q

      - name: Whitespace check
        run: git diff --check
